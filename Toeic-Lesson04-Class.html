<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 04 上課投影版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F172A;--amber:#F59E0B;--green:#059669;--green-lt:#D1FAE5;--green-dk:#064E3B;--red:#DC2626;--red-lt:#FEE2E2;--sky:#0EA5E9;--sky-lt:#E0F2FE;--purple:#7C3AED;--gray-400:#94A3B8}
html,body{height:100%;overflow:hidden}
body{font-family:"Noto Sans TC","Inter",sans-serif;background:var(--navy);color:white;display:flex;flex-direction:column}

#topbar{height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08)}
.top-badge{background:var(--amber);color:var(--navy);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:Inter,sans-serif;letter-spacing:.5px}
.top-title{font-size:14px;font-weight:600;color:rgba(255,255,255,.7);margin-left:12px}
.top-right{display:flex;align-items:center;gap:16px}
#progress-text{font-family:"JetBrains Mono",monospace;font-size:13px;color:rgba(255,255,255,.45)}
.pbwrap{width:140px;height:4px;background:rgba(255,255,255,.1);border-radius:2px}
#progress-bar{height:100%;background:var(--amber);border-radius:2px;transition:width .3s}

#slide-area{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px 40px 16px}
.slide{width:100%;max-width:940px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

#bottombar{height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.07)}
.nav-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:white;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:"Noto Sans TC",sans-serif;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.14)}
.nav-btn:disabled{opacity:.25;cursor:default}
.center-btns{display:flex;align-items:center;gap:10px;flex-direction:column}
#slide-type-label{font-size:11px;color:rgba(255,255,255,.3);font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:1px}
.action-row{display:flex;gap:8px}
.action-btn{border:none;border-radius:10px;padding:9px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:"Noto Sans TC",sans-serif;transition:all .15s}
.action-btn.hidden{display:none}
#reveal-btn{background:var(--amber);color:var(--navy)}
#reveal-btn:hover{background:#FBBF24}
#next-item-btn{background:rgba(14,165,233,.2);color:#38BDF8;border:1px solid rgba(14,165,233,.3)}
#next-item-btn:hover{background:rgba(14,165,233,.3)}
#ask-btn{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
#ask-btn:hover{background:rgba(245,158,11,.25)}
.zh-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:"Noto Sans TC",sans-serif;transition:all .15s}
.zh-btn.on{background:rgba(14,165,233,.15);border-color:rgba(14,165,233,.4);color:#38BDF8}
.zh-hidden{display:none!important}

.gram-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--amber);margin-bottom:8px}
.gram-title{font-size:28px;font-weight:900;font-family:Inter,sans-serif;margin-bottom:5px}
.gram-sub{font-size:15px;color:rgba(255,255,255,.45);margin-bottom:20px}
.g-question{font-size:19px;font-weight:700;background:rgba(245,158,11,.12);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:18px}
.g-highlight{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18);border-radius:8px;padding:11px 15px;font-size:13px;color:rgba(255,255,255,.8)}
.g-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:14px}
.g-table th,.g-table td{padding:9px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
.g-table th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.35);font-weight:700}
.cell-em{font-family:"JetBrains Mono",monospace;color:var(--amber);font-weight:700;font-size:14px}
.g-table .snum{font-family:"JetBrains Mono",monospace;font-weight:800;color:var(--navy);background:var(--amber);text-align:center;border-radius:6px;width:36px}

#ask-panel{background:rgba(245,158,11,.08);border:1.5px solid rgba(245,158,11,.2);border-radius:12px;padding:16px 20px;margin-top:16px}
.ask-progress{font-size:11px;color:rgba(255,255,255,.35);font-family:"JetBrains Mono",monospace;margin-bottom:10px}
.ask-q{font-size:16px;font-weight:700;color:white;margin-bottom:10px}
.ask-a{display:none;background:rgba(5,150,105,.15);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:10px 14px;font-size:15px;color:#34D399;font-weight:700}
.ask-a.show{display:block}

/* ARTICLE */
.art-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--sky);margin-bottom:10px}
.art-title{font-size:22px;font-weight:800;font-family:Inter,sans-serif;margin-bottom:5px}
.art-theme{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:16px}
.art-text{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:20px 22px;font-size:15px;line-height:2.1;color:rgba(255,255,255,.85);margin-bottom:12px}
.art-text p{margin-bottom:12px}
.art-text p:last-child{margin-bottom:0}
.art-blank{color:var(--amber);font-weight:800;background:rgba(245,158,11,.12);padding:1px 7px;border-radius:4px}
.art-ins{background:rgba(124,58,237,.18);color:#A78BFA;font-weight:800;padding:1px 6px;border-radius:4px;font-family:"JetBrains Mono",monospace;font-size:13px}
.art-chat{display:flex;gap:10px;margin-bottom:10px;font-size:14px}
.art-chat b{color:var(--sky);min-width:50px;flex-shrink:0}
.art-zh{font-size:12px;color:rgba(255,255,255,.3);line-height:1.8}

/* QUESTION */
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.q-num{font-family:Inter,sans-serif;font-size:13px;font-weight:800;background:rgba(255,255,255,.12);padding:4px 12px;border-radius:6px}
.q-type-tag{font-size:12px;font-weight:700;background:rgba(14,165,233,.15);color:var(--sky);padding:4px 12px;border-radius:6px}
.q-star{font-size:12px;font-weight:700;background:rgba(245,158,11,.15);color:var(--amber);padding:4px 10px;border-radius:6px}
.q-p6{font-size:12px;font-weight:700;background:rgba(124,58,237,.15);color:#A78BFA;padding:4px 10px;border-radius:6px}
.q-sentence{font-size:17px;font-weight:500;line-height:1.9;background:rgba(255,255,255,.05);border-left:3px solid rgba(255,255,255,.2);border-radius:0 10px 10px 0;padding:13px 17px;margin-bottom:5px}
.q-sentence u{text-decoration:none;background:rgba(245,158,11,.18);color:var(--amber);font-weight:700;padding:0 6px;border-radius:4px}
.q-zh{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:16px;padding-left:2px}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.q-opts.wide{grid-template-columns:1fr}
.q-opt{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 15px;font-size:14px;transition:all .2s}
.q-opt-lbl{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:Inter,sans-serif}
.q-opt.correct{background:rgba(5,150,105,.16);border-color:var(--green)}
.q-opt.correct .q-opt-lbl{background:var(--green);color:white}
.q-opt.dimmed{opacity:.28}
.key-reveal{display:none;background:rgba(245,158,11,.08);border-left:3px solid var(--amber);border-radius:0 10px 10px 0;padding:11px 17px;font-size:14px;color:rgba(255,255,255,.85);margin-top:12px}
.key-reveal.show{display:block}
.key-reveal strong{color:var(--amber)}
</style>
</head>

<div id="topbar">
  <div style="display:flex;align-items:center">
    <span class="top-badge">上課投影</span>
    <span class="top-title">Lesson 04 · Part 6/7 閱讀策略（131–164）</span>
  </div>

    <span id="progress-text">1 / 47</span>
    <div class="pbwrap"><div id="progress-bar" style="width:2%"></div></div>

</div>

<div id="slide-area"><div class="slide" id="slide-content"></div></div>

<div id="bottombar">

    <span id="slide-type-label"></span>

      <button class="zh-btn" id="zh-btn" onclick="toggleZh()">中文 OFF</button>

</div>

<script>
const SLIDES = [
{type:'grammar',title:"Part 6 解題四步驟",subtitle:"先讀懂文章，再解題",content:"<table class='g-table'><tr><th style='width:50px'>步驟</th><th>做什麼</th></tr><tr><td class='snum'>1</td><td>先看文章類型（Dear Lily → Email；In new product development → 商業文章）</td></tr><tr><td class='snum'>2</td><td>先把整段大意讀過一次，不要急著填空</td></tr><tr><td class='snum'>3</td><td>看空格前後：詞性、固定搭配、單複數、連接詞、文意邏輯、句子插入</td></tr><tr><td class='snum'>4</td><td>填進去後再讀一次，問自己「整句自然嗎？接得上前後文嗎？」</td></tr></table><div class='g-highlight'><strong>核心提醒：</strong>不需要一開始就翻完整篇。先抓：這是什麼文章、誰、要做什麼、重要數字、時間、結果。</div>",ask:[["看到 Dear Lily 開頭，這是哪種文章類型？", "Email（書信）"], ["看到 In new product development 開頭，這是哪種文章？", "商業／管理文章"]]},
{type:'grammar',title:"Part 7 解題三步驟",subtitle:"先抓資訊，再回文章找答案",content:"<table class='g-table'><tr><th style='width:50px'>步驟</th><th>做什麼</th></tr><tr><td class='snum'>1</td><td>先看標題與格式（Property Details → 出租廣告；Graphics Designer → 徵才廣告）</td></tr><tr><td class='snum'>2</td><td>先抓四個資訊：Who（誰）、What（發生什麼事）、When（什麼時候）、Why（原因/目的）</td></tr><tr><td class='snum'>3</td><td>題目問什麼，再回文章找答案——每一題都要在文章裡找到證據</td></tr></table><div class='g-highlight'><strong>五種題型應對方式：</strong>目的題看整篇在做什麼；細節題回文章找原句；NOT題逐項核對找沒出現的；推論題只能根據文章推；單字題一定回原句看語境。</div>",ask:[["NOT 題的解題方法是什麼？", "逐項回文章核對，找沒有出現的那一項"], ["推論題可以自己加想像嗎？", "不可以，只能根據文章內容合理推論"]]},
{type:'article',label:"Part 6 · 131–134 文章",text:"Our physical diet has a large <b class='art-blank'>---131---</b> on our levels of health and energy. If we eat fresh, healthy, high-quality foods of all kinds and avoid the foods that are bad for us, we will have more energy, be generally <b class='art-blank'>---132---</b> to most diseases, sleep better, and feel healthier and happier. In the same way, our mental diet largely <b class='art-blank'>---133---</b> our character and personality. When we <b class='art-blank'>---134---</b>, we develop a more positive and effective personality.",zh:"我們的身體飲食對健康和能量水平有很大的影響。如果我們吃新鮮、健康、高品質的各種食物，並避免對我們不好的食物，我們會更有能量、通常更能抵抗大多數疾病、睡得更好、感覺更健康快樂。同樣地，我們的心理飲食在很大程度上決定我們的性格與人格。當我們用正面想法滋養心智時，我們會發展出更正面、有效的人格。",theme:"physical diet 影響身體；mental diet 影響人格"},
{type:'question',num:131,qtype:"固定搭配",star:true,part6:true,sentence:"Our physical diet has a large <u>---131---</u> on our levels of health and energy.",zh:"我們的身體飲食對健康和能量水平有很大的影響。",options:["thought", "dream", "impact", "attitude"],answer:2,key:"have an impact on = 對……有影響（固定搭配）。"},
{type:'question',num:132,qtype:"詞性+固定搭配",star:false,part6:true,sentence:"we will have more energy, be generally <u>---132---</u> to most diseases...",zh:"我們會更有能量，通常對大多數疾病有抵抗力...",options:["resistant", "resist", "resistance", "resists"],answer:0,key:"be 後面需要形容詞，be resistant to = 對……有抵抗力（固定搭配）。"},
{type:'question',num:133,qtype:"主詞動詞一致",star:true,part6:true,sentence:"In the same way, our mental diet largely <u>---133---</u> our character and personality.",zh:"同樣地，我們的心理飲食在很大程度上決定我們的性格與人格。",options:["determines", "determining", "determine", "determination"],answer:0,key:"核心主詞是 diet（單數），現在式動詞要加 s → determines。determination 是名詞，詞性不對。"},
{type:'question',num:134,qtype:"文章主旨判斷",star:false,part6:true,sentence:"When we <u>---134---</u>, we develop a more positive and effective personality.",zh:"當我們用正面想法滋養心智時，我們會發展出更正面、有效的人格。",options:["work hard enough", "feed our mind with positive ideas", "deal with difficult customers", "encounter problems"],answer:1,key:"文章主軸是 mental diet，feed our mind with positive ideas 和主題完全吻合，其他選項都偏離主題。"},
{type:'article',label:"Part 6 · 135–138 文章",text:"Successful <b class='art-blank'>---135---</b> see their company as a series of interlocking parts. Each division is important on its own, but it is also <b class='art-blank'>---136---</b> to the support of the others. That is the only way to be sure that the product is as good <b class='art-blank'>---137---</b> the advertising. The General Manager of Best-Tech Company says, \"<b class='art-blank'>---138---</b>, we also focus on the need for an efficient service department.\"",zh:"成功的管理者會把他們的公司看成一系列互相連結的部分。每個部門本身都很重要，但它對其他部門的支持也是必要的。這是唯一能確保產品和廣告一樣好的方式。Best-Tech 公司的總經理說：「除了吸引新顧客之外，我們也重視有效率的服務部門。」",theme:"成功的管理者把公司看成互相連結的系統"},
{type:'question',num:135,qtype:"商業語境",star:false,part6:true,sentence:"Successful <u>---135---</u> see their company as a series of interlocking parts.",zh:"成功的管理者會把他們的公司看成一系列互相連結的部分。",options:["candidates", "managers", "subordinates", "parents"],answer:1,key:"誰最可能把公司看成整體系統？managers（管理者）最合理。"},
{type:'question',num:136,qtype:"形容詞固定搭配",star:true,part6:true,sentence:"Each division is important on its own, but it is also <u>---136---</u> to the support of the others.",zh:"每個部門本身都很重要，但它對其他部門的支持也是必要的。",options:["impersonal", "necessary", "operational", "effective"],answer:1,key:"be necessary to = 對……是必要的（固定搭配）。"},
{type:'question',num:137,qtype:"同等比較句型",star:true,part6:true,sentence:"That is the only way to be sure that the product is as good <u>---137---</u> the advertising.",zh:"這是唯一能確保產品和廣告一樣好的方式。",options:["as", "like", "the same", "similar to"],answer:0,key:"as + adj. + as（同等比較）→ as good as。"},
{type:'question',num:138,qtype:"上下文銜接",star:false,part6:true,sentence:"The General Manager says, \"<u>---138---</u>, we also focus on the need for an efficient service department.\"",zh:"總經理說：「除了吸引新顧客之外，我們也重視有效率的服務部門。」",options:["Therefore, it is necessary to take actions", "As long as you are competitive enough", "When we are talking to strangers", "In addition to attracting new customers"],answer:3,key:"後面有 also，前面要接「另一件事」→ In addition to attracting new customers（除了吸引新顧客之外）。"},
{type:'article',label:"Part 6 · 139–142 文章",text:"Dear Lily,<br><br>I am sorry to tell you that it seems there are <b class='art-blank'>---139---</b> problems in the project report you sent me yesterday. Could you have <b class='art-blank'>---140---</b> look at the data from the survey? We need to have a correct <b class='art-blank'>---141---</b> of the report next Wednesday. This is urgent. We don't have much time as <b class='art-blank'>---142---</b>. Please do call me if you need any further information.<br><br>Best wishes,<br>John",zh:"親愛的 Lily，很抱歉要告訴你，你昨天寄給我的專案報告裡似乎有幾個問題。你可以再看一次調查資料嗎？我們下週三前需要一份正確版本的報告。這件事很緊急，我們沒有很多時間，因為專案必須在一週內完成。如果需要進一步資訊請務必打電話給我。",theme:"John 請 Lily 重新檢查報告，時間緊急"},
{type:'question',num:139,qtype:"數量詞+複數可數",star:false,part6:true,sentence:"There are <u>---139---</u> problems in the project report.",zh:"專案報告裡似乎有幾個問題。",options:["any", "another", "several", "little"],answer:2,key:"problems 是複數可數名詞 → several problems（幾個問題）。any 用於否定/問句；another 接單數；little 修飾不可數名詞。"},
{type:'question',num:140,qtype:"固定搭配",star:true,part6:true,sentence:"Could you have <u>---140---</u> look at the data from the survey?",zh:"你可以再看一次這份調查資料嗎？",options:["another", "the other", "others", "other"],answer:0,key:"have another look at = 再看一次、重新檢查（固定搭配）。look 是單數名詞，只能搭配 another。"},
{type:'question',num:141,qtype:"名詞搭配",star:false,part6:true,sentence:"We need to have a correct <u>---141---</u> of the report next Wednesday.",zh:"我們下週三需要有一份正確版本的報告。",options:["answer", "plan", "version", "test"],answer:2,key:"a version of the report = 報告的一個版本，最自然搭配。"},
{type:'question',num:142,qtype:"前後邏輯題",star:false,part6:true,sentence:"We don't have much time as <u>---142---</u>.",zh:"我們沒有很多時間，因為這個專案必須在一週內完成。",options:["the project is not that important", "the project is extremely ambitious", "the project has been assigned to Mr. Chen", "the project has to be completed within a week"],answer:3,key:"as = because，後面要接「為什麼時間不多」最直接的原因 → 專案必須一週內完成。"},
{type:'article',label:"Part 6 · 143–146 文章",text:"In new product development, it takes more <b class='art-blank'>---143---</b> the accepted basics of high quality, low cost, and differentiation to succeed in today's <b class='art-blank'>---144---</b>. The new rules also emphasize the <b class='art-blank'>---145---</b> of speed and flexibility as these are key components in delivering new products to market. Therefore, nowadays companies are trying to <b class='art-blank'>---146---</b> how to move faster than their competitors.",zh:"在新產品開發中，要在今日競爭激烈的全球市場成功，光靠高品質、低成本和差異化還不夠。這些新規則也強調速度和彈性的重要性，因為它們是把新產品推向市場的重要要素。因此，現在許多公司正試著想出如何比競爭對手更快行動的方法。",theme:"基本條件還不夠，速度與彈性才是關鍵"},
{type:'question',num:143,qtype:"固定搭配 more than",star:true,part6:true,sentence:"It takes more <u>---143---</u> the accepted basics of high quality, low cost, and differentiation to succeed.",zh:"要成功，所需要的不只是高品質、低成本和差異化這些基本原則。",options:["then", "to", "than", "from"],answer:2,key:"more than = 不只是、光靠……還不夠（固定搭配）。"},
{type:'question',num:144,qtype:"語境判斷",star:false,part6:true,sentence:"To succeed in today's <u>---144---</u>.",zh:"要在今日競爭激烈的全球市場中成功。",options:["natural environments", "famous graduate schools", "competitive world markets", "easy atmosphere"],answer:2,key:"整段主題是 product development、competitors、move faster → competitive world markets 最合理。"},
{type:'question',num:145,qtype:"固定搭配 importance of",star:false,part6:true,sentence:"The new rules also emphasize the <u>---145---</u> of speed and flexibility.",zh:"這些新規則也強調速度和彈性的重要性。",options:["importance", "appearance", "development", "achievement"],answer:0,key:"emphasize the importance of = 強調……的重要性（固定搭配）。"},
{type:'question',num:146,qtype:"動詞片語搭配",star:false,part6:true,sentence:"Nowadays companies are trying to <u>---146---</u> how to move faster than their competitors.",zh:"現在公司正試著想出如何比競爭對手更快行動的方法。",options:["apply for", "figure out", "devote to", "speed up"],answer:1,key:"figure out how to V = 想出如何做某事，後面接 how to + 原形動詞最自然。"},
{type:'article',label:"Part 7 · 147–148 文章",text:"<p><b>Property Details</b></p><p>3723 Cedar Lane, Teaneck, NJ 45837</p><p>For Rent: 2000 sq. ft. office building, 2 miles north of Teaneck. Can be divided into two businesses (USD$700/month for one office, USD$800/month for larger office with kitchen) or will rent the entire building for $1500/month. Large parking lot. Call (123) 2848-3828 to schedule a visit.</p><p>Updated: 01-05</p>",zh:"出租：一棟 2,000 平方英尺的辦公大樓，位於 Teaneck 北方兩英里處。可以分成兩間辦公空間出租（每月700美元/每月800美元含廚房），也可以整棟以每月1,500美元出租。有大型停車場，請打電話預約參觀。",theme:"辦公大樓出租廣告"},

{type:'question',num:148,qtype:"單字同義題",star:false,part6:false,sentence:"The word \"entire\" in line 3 is closest in meaning to",zh:"第三行的 entire 最接近哪一個意思？",options:["immediate", "worth", "whole", "tired"],answer:2,key:"rent the entire building = 整棟建築出租，entire = whole（整個的）。"},
{type:'article',label:"Part 7 · 149–150 文章",text:"<div class='art-chat'><b>Anna</b><span>Hey, Leo. We are supposed to write a marketing report, right? But I'm not sure what we should do.</span></div><div class='art-chat'><b>Leo</b><span>Yes, and what we should do is to choose a product or service and compare two companies that produce it.</span></div><div class='art-chat'><b>Anna</b><span>All right, I see. Then I plan to do instant coffee. There are so many brands on the market now.</span></div><div class='art-chat'><b>Leo</b><span>Good idea. Maybe you can also mention something like herbal tea? People think it's healthier, right?</span></div><div class='art-chat'><b>Anna</b><span>Exactly. I'll cover that part as well. Thank you for your help.</span></div><div class='art-chat'><b>Leo</b><span>Sure, no problem at all. If you need further assistance, just send me a message.</span></div>",zh:"Anna 和 Leo 要寫一份行銷報告，要選一項產品或服務並比較兩家公司。Anna 決定做即溶咖啡，Leo 建議她也可以加入花草茶這個相關內容。",theme:"同學討論行銷報告內容"},
{type:'question',num:149,qtype:"主旨題",star:false,part6:false,sentence:"What are Anna and Leo discussing via Messenger?",zh:"Anna 和 Leo 正透過 Messenger 討論什麼？",options:["What to include in their marketing report", "The sales of their instant coffee", "A new product they are going to launch", "Market expansion in Japan"],answer:0,key:"整段對話都在討論報告要選什麼產品、比較哪兩家公司——討論報告內容。"},
{type:'question',num:150,qtype:"說話目的題",star:false,part6:false,sentence:"Why does Leo mention, \"Maybe you can also mention something like herbal tea\"?",zh:"Leo 為什麼提到「也許你也可以提到像花草茶之類的東西」？",options:["To invite Anna to drink something together", "To make sure if Anna has some tea", "To suggest that Anna include another related topic", "To remind Anna to prepare tea for a meeting"],answer:2,key:"Leo 是在給 Anna 報告內容建議，建議她加入相關主題，不是邀請喝茶。"},
{type:'article',label:"Part 7 · 151–153 文章",text:"<p><b>Home sales down 13% in July</b></p><p>Local home sales in July fell to the lowest level since 2016, even as average prices closed in on an all-time high, according to statistics released Monday.</p><p>Members of the Springfield Real Estate Board sold 922 homes last month, a decrease of 13% from the 1,059 homes that changed hands a year earlier. \"The market was forecasted to slow down in 2017 as a result of recent mortgage changes, and indeed it has,\" said Kim Timberland, the manager of the Springfield Real Estate Board.</p><p>Condominium sales did not decrease as sharply as the broader market, falling 8%. Average prices increased 1% year over year.</p>",zh:"七月當地房屋銷售量下降了13%，是2016年以來最低，但平均房價沒有下降，反而上升1%。市場放緩其實早就被預測。",theme:"銷售量下降但房價不降反升"},
{type:'question',num:151,qtype:"標題細節題",star:false,part6:false,sentence:"What has happened to the home sales in July?",zh:"七月的房屋銷售發生了什麼變化？",options:["It decreased by 30%.", "It dropped by 13%.", "It increased by 13%.", "It surged to its record high."],answer:1,key:"標題直接寫 Home sales down 13% in July。"},
{type:'question',num:152,qtype:"引述推論題",star:true,part6:false,sentence:"According to the article, what has Kim Timberland suggested?",zh:"根據文章，Kim Timberland 表示了什麼？",options:["The drop-off was totally unexpected.", "People did not expect that the market would slow down at all.", "People predicted the situation would happen anyway.", "The drop-off shocked many analysts."],answer:2,key:"原文是 not entirely unexpected（雙重否定陷阱），意思是市場變慢早就被預期。"},
{type:'question',num:153,qtype:"推論題",star:false,part6:false,sentence:"According to the article, what can be inferred about the average home price?",zh:"根據文章，可以推論平均房價如何？",options:["It was seriously affected.", "It increased over 10%.", "It edged higher a little as well.", "It fell by 8%."],answer:2,key:"Average prices increased 1% year over year，1%是小幅上升 → edged higher。"},
{type:'article',label:"Part 7 · 154–156 文章",text:"<p><b>University Town Green Festival</b></p><p>Saturday, July 15th, 10:00 a.m. — Jasper Hall, University Town</p><p>The east region's largest and most trusted green living event is bringing the University Town green community together at the Green Festival for the third time. Join us for leaders in the environmental community, an organic pavilion, a Green Kids' Zone and a unique marketplace of more than 300 eco-friendly businesses.</p><p>Local nonprofits are invited to enter Community Green Grants contest for the chance to win a $1,000 grant or a $500 runner-up prize.</p>",zh:"這是一場環保生活活動，有環保社群領袖、有機展區、兒童綠色區、超過300家環保企業的市集，非營利組織可參加獎助金比賽。",theme:"推廣環保生活意識的社區活動"},
{type:'question',num:154,qtype:"目的題",star:false,part6:false,sentence:"What is the purpose of the event?",zh:"這個活動的目的為何？",options:["To raise awareness of green environment", "To inform students of new training courses", "To attract new customers to purchase products", "To announce a new policy to the public"],answer:0,key:"文章反覆出現 green living、eco-friendly，目的是提升環保意識。"},
{type:'question',num:155,qtype:"NOT題",star:true,part6:false,sentence:"What is NOT mentioned as one of this event's features?",zh:"以下哪一項沒有被提到是這個活動的特色？",options:["It is the biggest event in the east region.", "The event will last for the whole week.", "Leaders in the community will also participate.", "A contest will take place in the event."],answer:1,key:"文章只寫 Saturday, July 15th，沒有說活動持續一整週。其他三項都能在文章找到證據。"},
{type:'question',num:156,qtype:"單字同義題",star:false,part6:false,sentence:"The word \"grant\" in the last line is closest in meaning to",zh:"最後一行的 grant 最接近哪一個意思？",options:["subsidy", "brand", "profit", "innovation"],answer:0,key:"win a $1,000 grant，對象是nonprofit，grant=補助金=subsidy。"},
{type:'article',label:"Part 7 · 157–158 文章",text:"<p><b>Graphics Designer — Goleta City, GA</b></p><p>Max Services is recruiting an entry-level Graphics Designer for a reputable company in Goleta City. Candidates must have a one-year minimum experience working with graphics and creating specific designs. Candidates should have experience working with graphic software as well as Microsoft Office programs. Position is 1st shift. There are never any fees to applicants or employees.</p><p>To apply for this position, please visit www.max-services.net. Please include an updated resume with your application.</p>",zh:"Max Services 正在替 Goleta City 一家信譽良好的公司招募初階平面設計師。應徵者需要一年平面設計經驗，並熟悉平面設計軟體和 Microsoft Office。",theme:"平面設計師徵才廣告"},
{type:'question',num:157,qtype:"推論題",star:false,part6:false,sentence:"According to the article, what can be inferred about the Max Services company?",zh:"根據文章，可以推論 Max Services 公司如何？",options:["Its website is currently under construction.", "It is a rather old company.", "It is now hiring.", "It is located in Asia."],answer:2,key:"is recruiting = 正在徵人，可推論目前正在 hiring。"},
{type:'question',num:158,qtype:"NOT題",star:false,part6:false,sentence:"Which of the following is NOT a requirement of the job?",zh:"以下哪一項不是這份工作的要求？",options:["Applicants should possess at least one year of experience.", "Applicants should be familiar with graphical software applications.", "Applicants need to know how to use MS Office programs.", "Applicants must have experience designing computer programs."],answer:3,key:"graphic software（平面設計軟體）≠ computer programs（電腦程式），文章沒有提到設計程式的要求。"},
{type:'article',label:"Part 7 · 159–161 文章",text:"<p><b>Grand Hotel</b></p><p>Grand Hotel is located at the border of New Jersey and New York. The hotel targets customers for business and leisure purposes. Grand Hotel offers luxury rooms, hospitable services, and completely furnished business facilities. Grand Hotel owns 150 comfortable guest rooms with simple and graceful designs.</p><p><b>Business Center</b> — opens 24 hours, fully equipped with business facilities.<br><b>Fitness Center</b> — free fitness equipment to release stress.<br><b>Wireless Internet Access</b> — available in the public area.<br><b>Laundry Service</b> — washing and ironing, returned the same day.<br>Cab Service ／ Airplane Ticket Reservation ／ Airport Transfer Service ／ And more!</p>",zh:"Grand Hotel 位於 New Jersey 和 New York 的交界，主要服務商務與休閒旅客，提供商務中心、健身中心、無線網路、洗衣服務、計程車服務、機票訂位、機場接送等服務。",theme:"飯店服務與賣點介紹"},
{type:'question',num:159,qtype:"目的題",star:false,part6:false,sentence:"What's the purpose of this introduction?",zh:"這篇介紹的目的為何？",options:["To encourage foreign investments", "To fill a vacancy for a hotel manager", "To promote unique selling points of a hotel", "To explain how to release stress"],answer:2,key:"文章列出多項飯店服務與賣點，整篇是在宣傳飯店的獨特賣點。"},
{type:'question',num:160,qtype:"單字同義題",star:false,part6:false,sentence:"The word \"graceful\" in line 6 is closest in meaning to",zh:"第六行的 graceful 最接近哪一個意思？",options:["pitiful", "thorough", "detailed", "beautiful"],answer:3,key:"simple and graceful designs，graceful = 優雅美麗的 = beautiful。"},
{type:'question',num:161,qtype:"NOT題",star:false,part6:false,sentence:"What is NOT mentioned as a service in the hotel?",zh:"以下哪一項沒有被提到是飯店服務？",options:["Movie theaters", "Workout facilities", "Business amenities", "Taxi to and from the airport"],answer:0,key:"健身、商務、機場接送都有提到，只有電影院文章沒有提到。"},
{type:'article',label:"Part 7 · 162–164 文章",text:"<p><b>The Art of Business Management — 12 Month Subscription</b></p><p>The Art of Business Management is the leading business management magazine examining the trends shaping Singapore business. <span class='art-ins'>[1]</span> Keep up to date on the world of business with a subscription which includes a monthly magazine delivered to your door. <span class='art-ins'>[2]</span></p><p>For a limited time, an exclusive 50% saving on a 12-month subscription. Your subscription includes:<br>✓ Magazine delivered each month <span class='art-ins'>[3]</span><br>✓ Daily news on our website<br>✓ Weekly newsletters</p><p>You can take up this offer before November 15. <span class='art-ins'>[4]</span> Subscribe today.</p>",zh:"商業管理雜誌的一年期訂閱廣告，每月寄送雜誌、網站每日新聞、每週電子報，限時訂閱一年五折優惠，須於11月15日前申請。",theme:"雜誌訂閱限時優惠廣告"},
{type:'question',num:162,qtype:"細節題",star:false,part6:false,sentence:"How often does the magazine come out?",zh:"這本雜誌多久出刊一次？",options:["Per week", "Per month", "Every other month", "Twice a month"],answer:1,key:"a monthly magazine，雜誌是 monthly，不要和 weekly newsletters（電子報）搞混。"},
{type:'question',num:163,qtype:"細節題",star:false,part6:false,sentence:"What benefit can subscribers enjoy if they subscribe to the magazine by 11/15?",zh:"如果讀者在11月15日前訂閱，可以享有什麼好處？",options:["Subscribers can get two extra issues.", "Subscribers will receive a 50% off discount.", "Subscribers can get a watch as a gift.", "Subscribers will receive free daily newsletters."],answer:1,key:"an exclusive 50% saving，期限前訂閱的優惠是五折。"},
{type:'question',num:164,qtype:"句子插入題",star:true,part6:false,sentence:"In which position does \"So why wait?\" best belong?",zh:"「那還等什麼呢？」這句話最適合放在哪一個位置？",options:["[1]", "[2]", "[3]", "[4]"],answer:3,key:"So why wait? 是催促行動句，最適合放在 deadline 後面、Subscribe today 前面，也就是 [4]。"}
];
const TOTAL = SLIDES.length;
let current=0, revealed=false, zhVisible=false;
let askStep=0;

function applyZh(){document.querySelectorAll('.zh-target').forEach(el=>el.classList.toggle('zh-hidden',!zhVisible))}
function toggleZh(){zhVisible=!zhVisible;applyZh();const b=document.getElementById('zh-btn');b.textContent=zhVisible?'中文 ON':'中文 OFF';b.classList.toggle('on',zhVisible)}

function showBtn(id,show){document.getElementById(id).classList.toggle('hidden',!show)}
function setText(id,t){const el=document.getElementById(id);if(el)el.textContent=t}

function render(){
  const s=SLIDES[current];
  revealed=false; askStep=0;
  document.getElementById('progress-text').textContent=(current+1)+' / '+TOTAL;
  document.getElementById('progress-bar').style.width=Math.round((current+1)/TOTAL*100)+'%';
  document.getElementById('prev-btn').disabled=current===0;
  document.getElementById('next-btn').disabled=current===TOTAL-1;
  const labels={grammar:'閱讀策略',article:'閱讀文章',question:'練習題'};
  setText('slide-type-label', labels[s.type]||'');
  showBtn('reveal-btn', s.type==='question');
  showBtn('next-item-btn', false);
  showBtn('ask-btn', s.type==='grammar' && s.ask && s.ask.length>0);
  showBtn('zh-btn', s.type==='question'||s.type==='article');
  const el=document.getElementById('slide-content');

  if(s.type==='grammar'){
    const hasAsk=s.ask&&s.ask.length>0;
    el.innerHTML=`
      <div class="gram-label">Lesson 04 · 閱讀策略</div>
      <div class="gram-title">${s.title}</div>
      <div class="gram-sub">${s.subtitle}</div>
      ${s.content}
      ${hasAsk?`<div id="ask-panel" style="display:none">
        <div class="ask-progress" id="ask-prog"></div>
        <div class="ask-q" id="ask-q"></div>
        <div class="ask-a" id="ask-a"></div>
      </div>`:''}
    `;
    if(hasAsk) document.getElementById('ask-btn').textContent='❓ 問學生 ('+s.ask.length+')';
  }
  else if(s.type==='article'){
    el.innerHTML=`
      <div class="art-label">${s.label}</div>
      <div class="art-title">閱讀文章</div>
      <div class="art-theme">📌 主題：${s.theme}</div>
      <div class="art-text">${s.text}</div>
      <div class="art-zh zh-target">${s.zh}</div>`;
  }
  else{
    const wide = s.options.some(o=>o.length>28);
    const opts=s.options.map((o,i)=>`<div class="q-opt" id="opt-${i}"><span class="q-opt-lbl">${String.fromCharCode(65+i)}</span>${o}</div>`).join('');
    el.innerHTML=`
      <div class="q-header">
        <span class="q-num">${s.num}</span>
        <span class="q-type-tag">${s.qtype}</span>
        ${s.star?'<span class="q-star">⭐ 重點題</span>':''}
        ${s.part6?'<span class="q-p6">Part 6</span>':''}
      </div>
      <div class="q-sentence">${s.sentence}</div>
      <div class="q-zh zh-target">${s.zh}</div>
      <div class="q-opts ${wide?'wide':''}">${opts}</div>
      <div class="key-reveal" id="key-reveal">
        <strong>答案 ${String.fromCharCode(65+s.answer)}：${s.options[s.answer]}</strong>
        &nbsp;—&nbsp; ${s.key}
      </div>`;
  }
  setTimeout(applyZh,0);
  resetRevealBtn();
}

function resetRevealBtn(){
  const b=document.getElementById('reveal-btn');
  b.textContent='揭曉答案 ▼';b.style.background='';b.style.color='';
}

function reveal(){
  const s=SLIDES[current];
  const b=document.getElementById('reveal-btn');
  if(!revealed){
    revealed=true;
    s.options.forEach((_,i)=>{
      const el=document.getElementById('opt-'+i);
      if(i===s.answer) el.classList.add('correct');
      else el.classList.add('dimmed');
    });
    document.getElementById('key-reveal').classList.add('show');
    b.textContent='隱藏答案 ▲';b.style.background='rgba(5,150,105,.25)';b.style.color='#34D399';
  } else {
    revealed=false;
    s.options.forEach((_,i)=>{
      const el=document.getElementById('opt-'+i);
      el.classList.remove('correct','dimmed');
    });
    document.getElementById('key-reveal').classList.remove('show');
    resetRevealBtn();
  }
}

function nextItem(){ /* unused in Lesson 04 (no multi/correction slides) */ }

function nextAsk(){
  const s=SLIDES[current];
  const panel=document.getElementById('ask-panel');
  const b=document.getElementById('ask-btn');
  if(!panel) return;
  if(askStep===0) panel.style.display='block';
  if(askStep<s.ask.length){
    const [q,a]=s.ask[askStep];
    document.getElementById('ask-q').textContent=q;
    document.getElementById('ask-a').textContent=a;
    document.getElementById('ask-a').classList.remove('show');
    document.getElementById('ask-prog').textContent='問題 '+(askStep+1)+' / '+s.ask.length;
    const oldStep=askStep;
    b.onclick=function(){
      const aa=document.getElementById('ask-a');
      if(!aa.classList.contains('show')){
        aa.classList.add('show');
        b.onclick=function(){askStep=oldStep+1;nextAsk()};
      }
    };
    askStep++;
  } else {
    panel.style.display='none';
    askStep=0;
    b.textContent='❓ 問學生 ('+s.ask.length+')';
    b.onclick=nextAsk;
  }
}

function navigate(dir){
  current=Math.max(0,Math.min(TOTAL-1,current+dir));
  render();
  document.getElementById('slide-area').scrollTop=0;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();navigate(1)}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();navigate(-1)}
  else if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    const s=SLIDES[current];
    if(s.type==='question') reveal();
    else if(s.type==='grammar'&&s.ask&&s.ask.length>0) document.getElementById('ask-btn').click();
  }
});

render();
</script>
</body>
</html>
